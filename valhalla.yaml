crucible:
  model: qwen3.5:9b
  schedule_hour: 4
dashboard:
  allow_localhost: true
  auth_key: change-me-dashboard-key
  cors_origins:
  - http://localhost:3000
  - http://localhost:3001
  - http://localhost:8765
  - http://127.0.0.1:8765
mesh:
  auth_token: change-me-to-a-long-random-string
  nodes:
    freya:
      ip: 100.102.105.3
      port: 8765
      role: memory
    heimdall:
      ip: 100.108.153.23
      port: 8765
      role: security
    hermes:
      ip: 100.86.195.123
      port: 8765
      role: courier
    thor:
      ip: 100.117.255.38
      port: 8765
      role: backend
model_router:
  cost_tracking: true
  routing:
    build: llama/Qwen3.5-35B-A3B-8bit
    fallback: llama/Qwen3.5-35B-A3B-8bit
    memory: nvidia/moonshotai/kimi-k2.5
    regression: nvidia/deepseek-ai/deepseek-r1
    review: nvidia/z-ai/glm-5
    spec: nvidia/z-ai/glm-5
    test: llama/Qwen3.5-35B-A3B-8bit
models:
  aliases:
    huginn: nvidia/z-ai/glm-5
    hugs: nvidia/z-ai/glm-5
    kimi: nvidia/moonshotai/kimi-k2.5
    local: llama/Qwen3.5-35B-A3B-8bit
    moon: nvidia/moonshotai/kimi-k2.5
    munnin: nvidia/moonshotai/kimi-k2.5
    odin: llama/Qwen3.5-35B-A3B-8bit
    qwen: llama/Qwen3.5-35B-A3B-8bit
  default: llama/Qwen3.5-35B-A3B-8bit
  providers:
    llama:
      api: openai-completions
      key: local
      url: http://127.0.0.1:8080/v1
    nvidia:
      api: openai-completions
      key: ${NVIDIA_API_KEY}
      url: https://integrate.api.nvidia.com/v1
node:
  name: odin
  port: 8765
  role: orchestrator
payments:
  stripe_key: ${STRIPE_SECRET_KEY}
  webhook_secret: ${STRIPE_WEBHOOK_SECRET}
philosopher_stone:
  schedule_hour: 3
pipeline:
  auto_merge: true
  branch_prefix: pipeline
  git_branching: true
plugins:
  enabled:
  - model-switch
  - watchdog
  - event-bus
  - working-memory
  - predictions
  - self-model
  - hypotheses
  - hydra
  - pipeline
  - crucible
  - philosopher-stone
  - model-router
  - belief-shadows
  - personality
  - socratic
  - marketplace
  - consumer-api
  - brain-installer
  - telegram
  - agent_profiles
  - voice
  - payments
  - alerts
  - adaptive-thinking
  - task-persistence
  - context-compactor
  - companion
  - browse
  - guardian
  - social
  - terminal
soul:
  identity: mesh/souls/IDENTITY.odin.md
  personality: mesh/souls/SOUL.odin.md
  user_profile: mesh/souls/USER.odin.md
telegram:
  allowed_users: []
  bot_token: ${TELEGRAM_BOT_TOKEN}
  notify_on:
  - pipeline.shipped
  - pipeline.escalated
  - debate.deadlock
  - crucible.broken
war_room:
  max_messages: 500
  overseer_interval_seconds: 60
  sync_interval_seconds: 30
