name: guardian
version: 1.0.0
category: security
rarity: rare
description: "Scam Shield — AI-powered scam and phishing detection. Color-coded threat levels (🟢🟡🔴) to protect users from SMS, email, and chat scams. Runs 100% locally."
routes:
  - method: POST
    path: /guardian/scan
  - method: POST
    path: /guardian/scan-email
  - method: POST
    path: /guardian/scan-batch
  - method: GET
    path: /guardian/stats
events:
  subscribes: [message.received, email.received]
  publishes: [guardian.scam_detected, guardian.suspect_flagged]
dependencies: []
